# orport-guard sample config
#
# This file is sourced by /bin/sh. Quote values that contain spaces.

STATE_DIR="/var/db/orport-guard"
PF_ANCHOR="orport-guard"
PROFILE="default"

ENABLE_IPV4=1
ENABLE_IPV6=1

# Space-separated torrc paths. Discovery supplements these with CLI --target values.
TORRC_PATHS="/usr/local/etc/tor/torrc /usr/local/etc/tor/torrc.d/*.conf /etc/tor/torrc /etc/tor/torrc.d/*.conf"

# Optional explicit targets. Format: IPv4:port or [IPv6]:port
TARGETS=""

# Optional extra trusted IPs or networks.
EXTRA_TRUST=""

# Optional extra local services to pass quickly inside the tool anchor.
EXEMPT_SERVICES=""

MAX_SRC_STATES=8
MAX_SRC_CONN=8
MAX_SRC_CONN_RATE_COUNT=9
MAX_SRC_CONN_RATE_WINDOW=60

# Lazily expire block-table entries once they are older than this many seconds.
# Both profiles default this to 300 unless you override it.
BLOCK_EXPIRE_SECONDS=300
